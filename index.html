<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحبك يا غزل ❤️</title>
    <style>
        body {
            background: linear-gradient(to bottom, #ff9a9e, #fecfef);
            text-align: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }
        h1 { color: white; font-size: 50px; margin-top: 50px; text-shadow: 2px 2px 4px #000; }
        .big-heart {
            font-size: 100px;
            background: none;
            border: none;
            cursor: pointer;
            animation: نبض 1s infinite;
        }
        @keyframes نبض { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .heart {
            position: fixed;
            bottom: -50px;
            animation: طيران linear forwards;
        }
        @keyframes طيران { to { transform: translateY(-110vh); } }
    </style>
</head>
<body>
    <h1>بحبك يا غزل</h1>
    <button class="big-heart" onclick="showLove()">❤️</button>
    <div id="hearts-container"></div>

    <!-- رسالة الحب الحلوة -->
    <div id="رسالة-الحب" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#ff1493; color:white; padding:25px; border-radius:20px; font-size:26px; z-index:9999; text-align:center; box-shadow:0 0 30px hotpink;">
        وأنا كمان بحبك يا غزل ❤️
        <br><br>
        <button onclick="document.getElementById('رسالة-الحب').style.display='none'" style="background:white; color:#ff1493; border:none; padding:12px 25px; border-radius:15px; font-size:20px; font-weight:bold;">حسناً</button>
    </div>

    <script>
        function showLove() {
            document.getElementById('رسالة-الحب').style.display = 'block';
        }
        
        const heartsContainer = document.getElementById('hearts-container');
        const heartEmoji = ['❤️','💖','💕','💓','💗'];
        
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = heartEmoji[Math.floor(Math.random() * heartEmoji.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heartsContainer.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 10000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
